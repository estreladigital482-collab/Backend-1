kind = "web"
previewPath = "/"
title = "Aura Sphere"
version = "1.0.0"
id = "artifacts/aura-sphere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19227

[services.development]
run = "pnpm --filter @workspace/aura-sphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-sphere", "run", "build" ]
publicDir = "artifacts/aura-sphere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19227"
BASE_PATH = "/"
