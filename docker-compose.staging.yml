version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aura_sphere_staging
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_pass_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user -d aura_sphere_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bridge:
    build:
      context: ./packages/bridge
      dockerfile: Dockerfile
    environment:
      - ENV=staging
      - SECRET_KEY=staging-secret-key
      - DATABASE_URL=postgresql://aura_user:aura_pass_staging@postgres:5432/aura_sphere_staging
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8001

volumes:
  postgres_staging_data:
