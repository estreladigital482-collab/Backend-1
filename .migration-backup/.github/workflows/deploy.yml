name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/bridge:latest -f packages/bridge/Dockerfile packages/bridge
      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest -f Dockerfile .
      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository }}/bridge:latest
      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:latest
